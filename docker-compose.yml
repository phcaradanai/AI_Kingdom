services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-kingdom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kingdom
      POSTGRES_PASSWORD: kingdom
      POSTGRES_DB: ai_kingdom
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kingdom -d ai_kingdom"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
