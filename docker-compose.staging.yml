services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_kingdom}
      POSTGRES_USER: ${POSTGRES_USER:-ai_kingdom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_kingdom} -d ${POSTGRES_DB:-ai_kingdom}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-kingdom

  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-20000}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-700}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    networks:
      - ai-kingdom

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - ai-kingdom

  # redis:
  #   image: redis:7-alpine
  #   restart: unless-stopped
  #   networks:
  #     - ai-kingdom

volumes:
  postgres-data:

networks:
  ai-kingdom:
    driver: bridge
